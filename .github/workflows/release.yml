name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Fahh Editor ${{ github.ref_name }}"
          releaseBody: |
            ## Fahh Editor ${{ github.ref_name }}

            A Tauri 2 desktop IDE with Monaco editor, integrated terminal, LSP support, code execution, debugging, and the legendary Fahh SFX.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows (x64) | `.msi` installer |
            | macOS (Apple Silicon) | `.dmg` |
            | macOS (Intel) | `.dmg` |
            | Linux (x64) | `.deb` and `.AppImage` |

            ### What's included
            - Monaco editor with full syntax highlighting for 15+ languages
            - LSP support (rust-analyzer, tsserver, pylsp, gopls, clangd auto-detected)
            - Code execution panel (Node.js, Python, Go, Java, C++, Rust)
            - DAP debugging (Python + Node.js/TypeScript)
            - 5 built-in themes
            - Formatter integration (Prettier, Black, gofmt, clang-format, rustfmt)
            - File tree, integrated terminal, Git status (Phase 2)
            - The fahhhh.mp3 — every error, every time

            See [TECHSPEC.md](https://github.com/Arnav1771/fahh-ide/blob/main/TECHSPEC.md) for full documentation.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
