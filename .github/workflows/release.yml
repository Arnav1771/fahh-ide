name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.1)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Step 1: create the GitHub Release first so all build jobs upload to
  # the same release ID — avoids the "already_exists" race condition when
  # multiple matrix runners try to create it simultaneously.
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '') || '${{ inputs.tag }}';
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name:   tag,
              name:       `Fahh Editor ${tag}`,
              draft:      false,
              prerelease: false,
              body: `## Fahh Editor ${tag}

A Tauri 2 desktop IDE with Monaco editor, LSP support, step-through debugger, one-click code execution, 5 built-in themes — and the fahhhh.mp3.

### Downloads
| Platform | File |
|----------|------|
| Windows 10/11 (x64) | \`.msi\` installer |
| macOS Apple Silicon | \`.dmg\` |
| macOS Intel | \`.dmg\` |
| Linux x64 | \`.AppImage\` · \`.deb\` |

### What's new
- Full LSP (rust-analyzer, tsserver, pylsp, gopls, clangd auto-detected on PATH)
- DAP debugger: Python (debugpy), Node.js/TypeScript (--inspect), Go (Delve)
- Run panel: one-click execution for 18+ languages with streaming output
- 5 built-in themes (Fahh Dark/Light, GitHub Dark, Dracula, Solarized)
- Formatter integration (Prettier, Black, gofmt, rustfmt, clang-format)
- Plugin registry with language packs and snippet sets
- Fahh SFX: plays on every error, 3-second cooldown, always

See the [full docs](https://arnav1771.github.io/fahh-ide/docs.html).`
            });
            core.setOutput('release_id', release.data.id);
            console.log('Created release id', release.data.id);

  # Step 2: build on all platforms and upload artifacts to the release.
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            label: linux-x64
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust-target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true

      - name: Install frontend deps
        run: pnpm install

      - name: Build and upload artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
