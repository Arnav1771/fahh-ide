name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.1)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            label: linux-x64
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust-target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true

      - name: Install frontend deps
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Fahh Editor ${{ github.ref_name }}"
          releaseBody: |
            ## Fahh Editor ${{ github.ref_name }}

            A Tauri 2 desktop IDE with Monaco editor, LSP support, step-through debugger,
            one-click code execution, 5 built-in themes — and the fahhhh.mp3.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows 10/11 (x64) | `.msi` installer |
            | macOS Apple Silicon | `.dmg` |
            | macOS Intel | `.dmg` |
            | Linux x64 | `.AppImage` · `.deb` |

            ### What's new
            - Full LSP (rust-analyzer, tsserver, pylsp, gopls, clangd auto-detected)
            - DAP debugger: Python (debugpy), Node.js/TS (--inspect), Go (Delve)
            - Run panel: one-click execution for 18+ languages with streaming output
            - 5 built-in themes, formatter integration, plugin registry
            - Fahh SFX: plays on every error, 3-second cooldown, always

            See the [full docs](https://arnav1771.github.io/fahh-ide/docs.html).
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
