<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>play.fahh — Try Fahh Editor in Your Browser</title>
<meta name="description" content="Run Python, JavaScript, and TypeScript code right in your browser. A live demo of the Fahh Editor — Monaco, Pyodide, and the FAHHHH sound effect included.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ─── Tokens ───────────────────────────────────────────────────────────── */
:root {
  --bg:        #050510;
  --bg-1:      #0a0a1c;
  --bg-2:      #111126;
  --bg-3:      #181830;
  --border:    rgba(160,155,220,.10);
  --border-md: rgba(160,155,220,.18);
  --v:         #7c3aed;
  --vl:        #a78bfa;
  --vd:        #4c1d95;
  --rose:      #e11d48;
  --rose-l:    #fb7185;
  --rose-glow: rgba(225,29,72,.35);
  --text:      #f0eeff;
  --text-2:    #9d9bbf;
  --text-3:    #5a5878;
  --gold:      #fbbf24;
  --green:     #34d399;
  --amber:     #f59e0b;

  --mono: 'Space Mono', 'Courier New', monospace;
  --body: 'DM Sans', system-ui, sans-serif;
  --code: 'JetBrains Mono', 'Cascadia Code', monospace;

  --ease-out-expo: cubic-bezier(.16,1,.3,1);

  /* Layout sizes */
  --nav-h:    48px;
  --tree-w:   184px;
  --term-h:   220px;
  --tab-h:    36px;
  --status-h: 24px;
}

/* ─── Reset ────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  display: flex;
  flex-direction: column;
}
a { color: inherit; text-decoration: none; }
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }

/* ─── Flash overlay ────────────────────────────────────────────────────── */
#flash-overlay {
  position: fixed; inset: 0; z-index: 9999;
  pointer-events: none;
  background: radial-gradient(ellipse 90% 80% at 50% 50%, rgba(225,29,72,.5) 0%, transparent 70%);
  opacity: 0;
  transition: opacity .08s;
}
#flash-overlay.active { opacity: 1; }

/* ─── FAHHHH banner ────────────────────────────────────────────────────── */
#fahh-banner {
  position: fixed; inset: 0; z-index: 10000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(5,5,16,.88);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none;
  transition: opacity .12s;
}
#fahh-banner.show { opacity: 1; pointer-events: auto; }
#fahh-banner .fahh-word {
  font-family: var(--mono);
  font-size: clamp(4rem, 12vw, 9rem);
  font-weight: 700;
  letter-spacing: -.05em;
  color: var(--rose);
  text-shadow:
    0 0 40px rgba(225,29,72,.8),
    0 0 100px rgba(225,29,72,.4);
  animation: fahh-shake .35s ease-in-out;
  line-height: 1;
}
#fahh-banner .fahh-err {
  font-family: var(--code);
  font-size: .8rem;
  color: var(--rose-l);
  margin-top: 16px;
  max-width: 560px;
  text-align: center;
  padding: 0 24px;
  opacity: .85;
}
#fahh-banner .fahh-dismiss {
  margin-top: 28px;
  font-family: var(--code);
  font-size: .7rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 8px 20px;
  border: 1px solid var(--border-md);
  border-radius: 100px;
  transition: color .15s, border-color .15s;
}
#fahh-banner .fahh-dismiss:hover { color: var(--text); border-color: var(--vl); }

@keyframes fahh-shake {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  20%       { transform: translateX(-8px) rotate(-1.5deg); }
  40%       { transform: translateX(8px) rotate(1.5deg); }
  60%       { transform: translateX(-5px) rotate(-.8deg); }
  80%       { transform: translateX(5px) rotate(.8deg); }
}

/* ─── Top nav ──────────────────────────────────────────────────────────── */
#nav {
  height: var(--nav-h);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border-md);
  gap: 12px;
  z-index: 100;
}

.nav-back {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--code); font-size: .72rem; color: var(--text-3);
  letter-spacing: .04em;
  padding: 5px 10px; border-radius: 5px;
  border: 1px solid transparent;
  transition: color .15s, border-color .15s, background .15s;
  flex-shrink: 0;
}
.nav-back:hover { color: var(--text); border-color: var(--border-md); background: var(--border); }
.nav-back svg { flex-shrink: 0; }

.nav-brand {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: .82rem; font-weight: 700;
  letter-spacing: -.02em; color: var(--text);
}
.nav-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--rose);
  box-shadow: 0 0 8px var(--rose-glow);
  animation: dot-pulse 2.4s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes dot-pulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: .7; }
}
.nav-sep {
  font-family: var(--code); font-size: .72rem; color: var(--text-3);
  padding: 0 4px;
}

/* ─── Toolbar (lang selector + run button) ─────────────────────────────── */
.nav-toolbar {
  display: flex; align-items: center; gap: 8px;
  margin-left: auto;
}

.lang-select {
  appearance: none;
  -webkit-appearance: none;
  background: var(--bg-2);
  border: 1px solid var(--border-md);
  color: var(--text);
  font-family: var(--code);
  font-size: .72rem;
  letter-spacing: .04em;
  padding: 5px 28px 5px 10px;
  border-radius: 5px;
  cursor: pointer;
  transition: border-color .15s;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%235a5878' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 8px center;
}
.lang-select:focus { outline: none; border-color: var(--vl); }
.lang-select:hover { border-color: var(--vl); }

.run-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 5px;
  background: var(--v); color: #fff;
  font-family: var(--code); font-size: .72rem; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  box-shadow: 0 4px 16px rgba(124,58,237,.35);
  transition: background .15s, box-shadow .15s, transform .1s;
  flex-shrink: 0;
  min-width: 72px; justify-content: center;
}
.run-btn:hover { background: #6d28d9; box-shadow: 0 6px 24px rgba(124,58,237,.5); }
.run-btn:active { transform: scale(.97); }
.run-btn.running {
  background: var(--bg-3);
  border: 1px solid var(--border-md);
  color: var(--rose-l);
  box-shadow: none;
}
.run-btn svg { flex-shrink: 0; }

.shortcut-hint {
  font-family: var(--code); font-size: .62rem; color: var(--text-3);
  letter-spacing: .04em;
  display: flex; align-items: center; gap: 3px;
}
.kbd {
  display: inline-block;
  padding: 2px 5px;
  border: 1px solid var(--border-md);
  border-radius: 3px;
  background: var(--bg-2);
  font-size: .58rem;
  color: var(--text-3);
  line-height: 1.4;
}

/* ─── Pyodide loading indicator ────────────────────────────────────────── */
.pyodide-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--code); font-size: .65rem; color: var(--text-3);
}
.py-spinner {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1.5px solid rgba(167,139,250,.2);
  border-top-color: var(--vl);
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.py-ready { color: var(--green); }

/* ─── IDE shell (everything below nav) ─────────────────────────────────── */
#ide {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

/* ─── Editor row (tree + monaco) ───────────────────────────────────────── */
#editor-row {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}

/* ─── File tree ────────────────────────────────────────────────────────── */
#file-tree {
  width: var(--tree-w);
  flex-shrink: 0;
  background: var(--bg-1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.tree-header {
  padding: 10px 12px 8px;
  font-family: var(--code);
  font-size: .6rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--text-3);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.file-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.file-list::-webkit-scrollbar { width: 4px; }
.file-list::-webkit-scrollbar-track { background: transparent; }
.file-list::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

.file-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  font-family: var(--code); font-size: .72rem;
  color: var(--text-2);
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: color .1s, background .1s, border-color .1s;
  user-select: none;
}
.file-item:hover { color: var(--text); background: rgba(124,58,237,.06); }
.file-item.active {
  color: var(--text);
  background: rgba(124,58,237,.1);
  border-left-color: var(--v);
}
.file-item .file-icon { font-size: .8rem; flex-shrink: 0; }
.file-item .file-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-item .file-ext {
  font-size: .6rem; color: var(--text-3);
  padding: 1px 5px; border-radius: 3px;
  background: var(--bg-3); border: 1px solid var(--border);
  flex-shrink: 0;
}

.tree-footer {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.tree-footer-text {
  font-family: var(--code); font-size: .6rem; color: var(--text-3);
  letter-spacing: .04em; line-height: 1.6;
}

/* ─── Monaco pane ──────────────────────────────────────────────────────── */
#monaco-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Tabs bar */
#tabs-bar {
  height: var(--tab-h);
  background: var(--bg-1);
  border-bottom: 1px solid var(--border-md);
  display: flex;
  align-items: flex-end;
  padding: 0 0 0 0;
  overflow-x: auto;
  flex-shrink: 0;
  gap: 0;
}
#tabs-bar::-webkit-scrollbar { display: none; }

.tab {
  display: flex; align-items: center; gap: 7px;
  padding: 0 16px;
  height: 100%;
  font-family: var(--code); font-size: .7rem;
  color: var(--text-3);
  cursor: pointer;
  border-right: 1px solid var(--border);
  border-top: 2px solid transparent;
  white-space: nowrap;
  transition: color .12s, background .12s;
  flex-shrink: 0;
}
.tab:hover { color: var(--text-2); background: rgba(255,255,255,.02); }
.tab.active {
  color: var(--text);
  background: var(--bg);
  border-top-color: var(--v);
}
.tab .tab-icon { font-size: .8rem; }
.tab .tab-name { }

/* ─── Monaco container ─────────────────────────────────────────────────── */
#monaco-container {
  flex: 1;
  min-height: 0;
  position: relative;
}

/* Monaco loading state */
.monaco-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  background: var(--bg);
  z-index: 10;
}
.monaco-loading-spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid rgba(167,139,250,.15);
  border-top-color: var(--vl);
  animation: spin .8s linear infinite;
}
.monaco-loading-text {
  font-family: var(--code); font-size: .72rem; color: var(--text-3);
  letter-spacing: .08em;
}

/* ─── Status bar ───────────────────────────────────────────────────────── */
#status-bar {
  height: var(--status-h);
  background: var(--v);
  display: flex; align-items: center;
  padding: 0 14px;
  gap: 0;
  flex-shrink: 0;
}
.status-item {
  font-family: var(--code); font-size: .62rem;
  color: rgba(255,255,255,.75);
  letter-spacing: .04em;
  padding: 0 10px;
  height: 100%; display: flex; align-items: center;
  border-right: 1px solid rgba(255,255,255,.12);
  white-space: nowrap;
}
.status-item:first-child { padding-left: 0; }
.status-item:last-child { border-right: none; margin-left: auto; }
.status-err-item { color: #fca5a5; }

/* ─── Terminal panel ───────────────────────────────────────────────────── */
#terminal-panel {
  height: var(--term-h);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-top: 1px solid var(--border-md);
  background: var(--bg-1);
}

#terminal-header {
  height: 30px; flex-shrink: 0;
  display: flex; align-items: center;
  padding: 0 14px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.term-title {
  font-family: var(--code); font-size: .65rem; letter-spacing: .14em;
  text-transform: uppercase; color: var(--text-2);
  font-weight: 700;
}
.term-clear-btn {
  font-family: var(--code); font-size: .62rem;
  color: var(--text-3); letter-spacing: .06em;
  padding: 2px 8px; border-radius: 3px;
  border: 1px solid transparent;
  transition: color .1s, border-color .1s;
  margin-left: auto;
}
.term-clear-btn:hover { color: var(--text-2); border-color: var(--border-md); }

#terminal-output {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  font-family: var(--code); font-size: .73rem; line-height: 1.7;
}
#terminal-output::-webkit-scrollbar { width: 4px; }
#terminal-output::-webkit-scrollbar-track { background: transparent; }
#terminal-output::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

.term-line {
  display: flex;
  gap: 10px;
  align-items: baseline;
}
.term-ts {
  color: var(--text-3); font-size: .62rem;
  flex-shrink: 0; width: 58px;
  font-variant-numeric: tabular-nums;
}
.term-msg { flex: 1; white-space: pre-wrap; word-break: break-word; }
.term-stdout { color: var(--green); }
.term-stderr { color: var(--rose-l); }
.term-info   { color: var(--vl); }
.term-warn   { color: var(--amber); }
.term-cmd    { color: var(--text-2); }
.term-empty  { color: var(--text-3); font-style: italic; }

/* ─── Mobile responsive ─────────────────────────────────────────────────── */
@media (max-width: 768px) {
  :root {
    --tree-w: 0px;
    --term-h: 180px;
  }
  #file-tree { display: none; }
  .shortcut-hint { display: none; }
  .nav-brand .nav-sep,
  .nav-brand .brand-sub { display: none; }

  #mobile-file-btn {
    display: flex;
  }
}

#mobile-file-btn {
  display: none;
  align-items: center; gap: 5px;
  font-family: var(--code); font-size: .65rem; color: var(--text-3);
  padding: 4px 8px; border-radius: 4px;
  border: 1px solid var(--border-md);
  transition: color .1s;
}
#mobile-file-btn:hover { color: var(--text); }

/* ─── Resize handle ─────────────────────────────────────────────────────── */
#term-resize {
  height: 4px; flex-shrink: 0;
  background: var(--border);
  cursor: ns-resize;
  transition: background .15s;
  position: relative;
}
#term-resize:hover { background: var(--v); }
#term-resize::after {
  content: '';
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 32px; height: 2px; border-radius: 1px;
  background: var(--border-md);
}

/* ─── Prefers reduced motion ─────────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

/* ─── Tree actions ────────────────────────────────────────────────────── */
.tree-header {
  /* override existing — make it flex */
  display: flex !important;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px 8px !important;
}
.tree-actions { display: flex; gap: 2px; }
.tree-btn {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; border-radius: 4px; color: var(--text-3);
  transition: color .1s, background .1s;
}
.tree-btn:hover { color: var(--text); background: rgba(124,58,237,.12); }

/* ─── New file input row ──────────────────────────────────────────────── */
.new-file-row {
  display: flex; align-items: center; gap: 4px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
}
.new-file-input {
  flex: 1; background: var(--bg-3); border: 1px solid var(--vl);
  border-radius: 4px; color: var(--text);
  font-family: var(--code); font-size: .72rem;
  padding: 3px 7px; outline: none;
}

/* ─── File item delete button ─────────────────────────────────────────── */
.file-delete {
  display: none; width: 16px; height: 16px;
  align-items: center; justify-content: center;
  font-size: .65rem; border-radius: 3px; color: var(--text-3);
  flex-shrink: 0; margin-left: auto;
  transition: color .1s, background .1s;
}
.file-item:hover .file-delete { display: flex; }
.file-delete:hover { color: var(--rose-l); background: rgba(225,29,72,.12); }

/* ─── Drag over ───────────────────────────────────────────────────────── */
#file-tree.drag-over {
  background: rgba(124,58,237,.07);
  border-right-color: var(--vl);
}
#file-tree.drag-over .tree-footer { border-top-color: var(--vl); }
#file-tree.drag-over .tree-footer-text { color: var(--vl); }

/* ─── Status download ─────────────────────────────────────────────────── */
.status-dl-btn { transition: color .1s !important; }
.status-dl-btn:hover { color: rgba(255,255,255,.9) !important; }
</style>
</head>
<body>

<!-- FAHHHH overlay -->
<div id="flash-overlay"></div>
<div id="fahh-banner">
  <div class="fahh-word">FAHHHH!</div>
  <div class="fahh-err" id="fahh-err-text"></div>
  <button class="fahh-dismiss" onclick="dismissFahh()">press any key or click to dismiss</button>
</div>

<!-- Top nav -->
<nav id="nav">
  <a href="index.html" class="nav-back" aria-label="Back to Fahh landing page">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Back to fahh
  </a>

  <div class="nav-brand">
    <span class="nav-dot"></span>
    <span>fahh</span>
    <span class="nav-sep brand-sub">·</span>
    <span class="brand-sub" style="color:var(--text-3);font-size:.75rem;font-weight:400">play.fahh</span>
  </div>

  <button id="mobile-file-btn" onclick="toggleMobileTree()" aria-label="Toggle file tree">
    <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
      <path d="M1 1h10M1 5h10M1 9h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    Files
  </button>

  <div class="nav-toolbar">
    <div class="pyodide-badge" id="py-badge" style="display:none">
      <div class="py-spinner" id="py-spinner"></div>
      <span id="py-badge-text">Loading Python…</span>
    </div>

    <select class="lang-select" id="lang-select" onchange="onLangChange(this.value)" aria-label="Language">
      <option value="javascript">JavaScript</option>
      <option value="python">Python</option>
      <option value="typescript">TypeScript</option>
    </select>

    <div class="shortcut-hint">
      <span class="kbd">Ctrl</span>+<span class="kbd">↵</span>
    </div>

    <button class="run-btn" id="run-btn" onclick="runCode()" aria-label="Run code">
      <svg id="run-icon" width="10" height="12" viewBox="0 0 10 12" fill="currentColor">
        <path d="M1 1l8 5-8 5V1z"/>
      </svg>
      <span id="run-label">Run</span>
    </button>
  </div>
</nav>

<!-- IDE body -->
<div id="ide">
  <div id="editor-row">

    <!-- File tree -->
    <aside id="file-tree">
      <div class="tree-header">
        <span>Explorer</span>
        <div class="tree-actions">
          <button class="tree-btn" title="New file" onclick="startNewFile()">+</button>
          <button class="tree-btn" title="Upload file" onclick="triggerUpload()">⬆</button>
        </div>
      </div>

function fibRecursive(n: number): number {
  if (n <= 1) return n;
  return fibRecursive(n - 1) + fibRecursive(n - 2);

function buildFileTree() {
  const list = document.getElementById('file-list');
  list.innerHTML = '';
  SAMPLE_FILES.forEach(f => {
    const item = document.createElement('div');
    item.className = 'file-item' + (f.id === currentFile.id ? ' active' : '');
    item.dataset.id = f.id;
    item.innerHTML = `
      <span class="file-icon">${f.icon}</span>
      <span class="file-name">${f.name}</span>
      ${f.userCreated ? '' : `<span class="file-ext">${f.ext}</span>`}
      <button class="file-delete" title="Delete file" onclick="deleteFile('${f.id}', event)">✕</button>
    `;
    item.addEventListener('click', () => loadFile(f));
    list.appendChild(item);
  });
}

function loadFile(file) {
  currentFile = file;
  currentLang = file.lang;

  // Update active state
  document.querySelectorAll('.file-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === file.id);
  });

  // Update tabs
  buildTabs();

  // Update lang select
  document.getElementById('lang-select').value = file.lang;

  // Set monaco content + language
  if (monacoEditor) {
    const model = monacoEditor.getModel();
    if (model) {
      window.monaco.editor.setModelLanguage(model, file.lang === 'typescript' ? 'typescript' : file.lang);
      monacoEditor.setValue(file.content);
    }
  }

  // Update status bar lang
  updateStatusLang();

  // If python, trigger lazy load
  if (file.lang === 'python' && !pyodideReady && !pyodideLoading) {
    loadPyodide();
  }
}

    tab.innerHTML = `<span class="tab-icon">${f.icon}</span><span class="tab-name">${f.name}</span>`;

/* ═══════════════════════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════════════════════ */
function termAppend(text, type = 'stdout') {
  const out = document.getElementById('terminal-output');

  // Remove placeholder on first real line
  const placeholder = out.querySelector('.term-empty');
  if (placeholder) placeholder.closest('.term-line').remove();

  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  const line = document.createElement('div');
  line.className = 'term-line';
  line.innerHTML = `<span class="term-ts">${ts}</span><span class="term-msg term-${type}">${escHtml(text)}</span>`;
  out.appendChild(line);
  out.scrollTop = out.scrollHeight;
}

function clearTerminal() {
  const out = document.getElementById('terminal-output');
  out.innerHTML = '';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

let fahhTimeout = null;

function triggerFahh(errorMsg) {
  clearTimeout(fahhTimeout);

  const banner = document.getElementById('fahh-banner');
  const overlay = document.getElementById('flash-overlay');
  const errText = document.getElementById('fahh-err-text');

  errText.textContent = errorMsg || 'An error occurred.';

  overlay.classList.add('active');
  banner.classList.add('show');

  fahhTimeout = setTimeout(() => {
    overlay.classList.remove('active');
    banner.classList.remove('show');

}

function dismissFahh() {
  clearTimeout(fahhTimeout);
  document.getElementById('flash-overlay').classList.remove('active');
  document.getElementById('fahh-banner').classList.remove('show');
}

document.addEventListener('keydown', (e) => {

/* ═══════════════════════════════════════════════════════════════════════════
   PYODIDE — lazy load
   ═══════════════════════════════════════════════════════════════════════════ */
async function loadPyodide() {
  if (pyodideLoading || pyodideReady) return;
  pyodideLoading = true;

  const badge = document.getElementById('py-badge');
  const spinner = document.getElementById('py-spinner');
  const badgeText = document.getElementById('py-badge-text');

  badge.style.display = 'flex';
  badgeText.textContent = 'Loading Python…';

  try {
    // Dynamically inject the Pyodide script tag
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js';
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });

    badgeText.textContent = 'Initializing…';
    pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/' });

    pyodideReady = true;
    pyodideLoading = false;

    // Update badge to ready state
    spinner.style.display = 'none';
    badgeText.textContent = 'Python ready';
    badgeText.style.color = 'var(--green)';
    setTimeout(() => { badge.style.display = 'none'; }, 2500);

  } catch (err) {
    pyodideLoading = false;
    badgeText.textContent = 'Python failed to load';
    badgeText.style.color = 'var(--rose-l)';
    console.error('Pyodide load error', err);
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   RUN CODE
   ═══════════════════════════════════════════════════════════════════════════ */
async function runCode() {
  if (isRunning) return;

  const code = monacoEditor ? monacoEditor.getValue() : '';
  if (!code.trim()) return;

  setStatusError('');
  clearTerminal();
  setRunning(true);

  const langLabel = { javascript: 'node', python: 'python3', typescript: 'tsx' };
  termAppend(`$ ${langLabel[currentLang] || currentLang} ${currentFile.name}`, 'cmd');

  try {
    if (currentLang === 'javascript') {
      await runJavaScript(code);
    } else if (currentLang === 'python') {
      await runPython(code);
    } else if (currentLang === 'typescript') {
      await runTypeScript(code);
    }
  } catch (err) {
    // Shouldn't happen — individual runners catch internally
    termAppend(String(err), 'stderr');
    setStatusError('1 error');
    triggerFahh(String(err));
  } finally {
    setRunning(false);
  }
}

/* ─── JavaScript runner ───────────────────────────────────────────────── */
function runJavaScript(code) {
  return new Promise((resolve) => {
    const logs = [];
    const origLog   = console.log;
    const origError = console.error;
    const origWarn  = console.warn;

    function restore() {
      console.log   = origLog;
      console.error = origError;
      console.warn  = origWarn;
    }

    function formatArgs(args) {
      return args.map(a => {
        if (typeof a === 'object' && a !== null) {
          try { return JSON.stringify(a, null, 2); } catch { return String(a); }
        }
        return String(a);
      }).join(' ');
    }

    console.log = (...args) => {
      const msg = formatArgs(args);
      termAppend(msg, 'stdout');
      origLog(...args);
    };
    console.error = (...args) => {
      const msg = formatArgs(args);
      termAppend(msg, 'stderr');
      origError(...args);
    };
    console.warn = (...args) => {
      const msg = formatArgs(args);
      termAppend(msg, 'warn');
      origWarn(...args);
    };

    try {
      // Use Function constructor for slightly safer scope isolation
      const fn = new Function(code);
      fn();
      restore();
      termAppend('Process exited with code 0', 'info');
      resolve();
    } catch (err) {
      restore();
      const msg = err.message || String(err);
      termAppend(msg, 'stderr');
      setStatusError('1 error — ' + (err.name || 'RuntimeError'));
      triggerFahh(err.name + ': ' + msg);
      resolve();
    }
  });
}

/* ─── TypeScript runner ───────────────────────────────────────────────── */
async function runTypeScript(code) {
  let transpiled;
  try {
    const result = Babel.transform(code, {
      presets: ['typescript'],
      filename: 'fahh.ts',
    });
    transpiled = result.code;
  } catch (err) {
    const msg = err.message || String(err);
    termAppend('TypeScript transpile error: ' + msg, 'stderr');
    setStatusError('Transpile error');
    triggerFahh('TypeScript SyntaxError: ' + msg);
    return;
  }
  await runJavaScript(transpiled);
}

/* ─── Python runner ───────────────────────────────────────────────────── */
async function runPython(code) {
  if (!pyodideReady) {
    termAppend('Python is not ready yet. Please wait…', 'warn');
    await loadPyodide();
    if (!pyodideReady) {
      termAppend('Failed to load Python runtime.', 'stderr');
      setStatusError('Python unavailable');
      return;
    }
  }

  // Redirect stdout/stderr
  pyodide.runPython(`
import sys, io
_stdout_buf = io.StringIO()
_stderr_buf = io.StringIO()
sys.stdout = _stdout_buf
sys.stderr = _stderr_buf
`);

  try {
    await pyodide.runPythonAsync(code);

    const stdout = pyodide.runPython('_stdout_buf.getvalue()');
    const stderr = pyodide.runPython('_stderr_buf.getvalue()');

    if (stdout) {
      stdout.split('\n').forEach(line => {
        if (line !== '') termAppend(line, 'stdout');
      });
    }
    if (stderr) {
      stderr.split('\n').forEach(line => {
        if (line !== '') termAppend(line, 'warn');
      });
    }

    termAppend('Process exited with code 0', 'info');

  } catch (err) {
    // Flush any buffered stdout before showing error
    try {
      const stdout = pyodide.runPython('_stdout_buf.getvalue()');
      if (stdout) stdout.split('\n').forEach(line => { if (line) termAppend(line, 'stdout'); });
    } catch (_) {}

    const msg = err.message || String(err);
    // Extract just the Python traceback portion
    const lines = msg.split('\n');
    lines.forEach(l => { if (l) termAppend(l, 'stderr'); });

    // Pull out the last line for the status bar
    const lastLine = lines.filter(Boolean).pop() || msg;
    setStatusError(lastLine.length > 60 ? lastLine.slice(0, 57) + '…' : lastLine);
    triggerFahh(lastLine);

  } finally {
    // Restore python IO
    try {
      pyodide.runPython('sys.stdout = sys.__stdout__; sys.stderr = sys.__stderr__');
    } catch (_) {}
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   LANGUAGE CHANGE
   ═══════════════════════════════════════════════════════════════════════════ */
function onLangChange(lang) {
  currentLang = lang;

  // Find a matching sample file
  const match = SAMPLE_FILES.find(f => f.lang === lang);
  if (match && match.id !== currentFile.id) {
    loadFile(match);
    return;
  }

  // Otherwise just switch the monaco language
  if (monacoEditor) {
    const monacoLang = lang === 'typescript' ? 'typescript' : lang;
    window.monaco.editor.setModelLanguage(monacoEditor.getModel(), monacoLang);
  }
  updateStatusLang();

  if (lang === 'python' && !pyodideReady && !pyodideLoading) {
    loadPyodide();
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   TERMINAL RESIZE
   ═══════════════════════════════════════════════════════════════════════════ */
(function setupResize() {
  const handle = document.getElementById('term-resize');
  const panel  = document.getElementById('terminal-panel');
  let dragging = false;
  let startY, startH;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startY = e.clientY;
    startH = panel.offsetHeight;
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'ns-resize';
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = startY - e.clientY;
    const newH = Math.max(80, Math.min(startH + delta, window.innerHeight - 200));
    panel.style.height = newH + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });
})();

    ],
    colors: {
      'editor.background': '#050510',
      'editor.foreground': '#f0eeff',
      'editorLineNumber.foreground': '#3d3b52',
      'editorLineNumber.activeForeground': '#7c6fa8',
      'editor.selectionBackground': '#7c3aed33',
      'editor.lineHighlightBackground': '#0a0a1c',
      'editorCursor.foreground': '#a78bfa',
      'editorIndentGuide.background': '#111126',
      'editorIndentGuide.activeBackground': '#1e1c40',
      'editorWhitespace.foreground': '#1e1c40',
      'editorGutter.background': '#050510',
      'scrollbarSlider.background': '#1e1c4055',
      'scrollbarSlider.hoverBackground': '#7c3aed44',
      'minimap.background': '#050510',
    }
  });

  const container = document.getElementById('monaco-container');

  monacoEditor = monaco.editor.create(container, {
    value: currentFile.content,
    language: currentFile.lang,
    theme: 'fahh-dark',
    fontFamily: "'JetBrains Mono', 'Cascadia Code', monospace",
    fontSize: 13,
    lineHeight: 21,
    fontLigatures: true,
    minimap: { enabled: true, scale: 1 },
    lineNumbers: 'on',
    scrollBeyondLastLine: false,
    renderWhitespace: 'selection',
    roundedSelection: false,
    padding: { top: 12, bottom: 12 },
    cursorBlinking: 'smooth',
    cursorSmoothCaretAnimation: 'on',
    smoothScrolling: true,
    wordWrap: 'off',
    tabSize: 2,
    insertSpaces: true,
    automaticLayout: true,
    overviewRulerLanes: 0,
    hideCursorInOverviewRuler: true,
    scrollbar: {
      verticalScrollbarSize: 6,
      horizontalScrollbarSize: 6,
    },
  });

  // Remove loading overlay once editor is mounted
  if (loadingEl) loadingEl.style.display = 'none';

  // Track cursor position for status bar
  monacoEditor.onDidChangeCursorPosition(e => {
    updateStatusPos(e.position.lineNumber, e.position.column);
  });

  // Auto-save on content change
  monacoEditor.onDidChangeModelContent(() => {
    scheduleAutoSave();
  });

  // Build UI
  loadFromLocalStorage();
  buildFileTree();
  buildTabs();
  updateStatusLang();

  // Set lang select default
  document.getElementById('lang-select').value = currentFile.lang;

  // Focus the editor
  monacoEditor.focus();
});

/* ═══════════════════════════════════════════════════════════════════════════
   FILE MANAGEMENT — new, delete, upload, download, localStorage
   ═══════════════════════════════════════════════════════════════════════════ */

// Extension → language + icon
function extToMeta(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  const map = {
    py:   { lang: 'python',     icon: '🐍' },
    js:   { lang: 'javascript', icon: '📜' },
    ts:   { lang: 'typescript', icon: '🔷' },
    jsx:  { lang: 'javascript', icon: '⚛️' },
    tsx:  { lang: 'typescript', icon: '⚛️' },
    json: { lang: 'json',       icon: '📋' },
    html: { lang: 'html',       icon: '🌐' },
    css:  { lang: 'css',        icon: '🎨' },
    md:   { lang: 'markdown',   icon: '📝' },
    txt:  { lang: 'plaintext',  icon: '📄' },
  };
  return map[ext] || { lang: 'plaintext', icon: '📄' };
}

// ── New file ──────────────────────────────────────────────────────────────
function startNewFile() {
  const row = document.getElementById('new-file-row');
  const inp = document.getElementById('new-file-input');
  row.style.display = 'flex';
  inp.value = '';
  inp.focus();
}

function confirmNewFile() {
  const inp = document.getElementById('new-file-input');
  const name = inp.value.trim();
  if (!name) { cancelNewFile(); return; }
  const finalName = name.includes('.') ? name : name + '.py';
  addFileToIDE(finalName, '');
  cancelNewFile();
}

function cancelNewFile() {
  document.getElementById('new-file-row').style.display = 'none';
  document.getElementById('new-file-input').value = '';
}

document.getElementById('new-file-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmNewFile();
  if (e.key === 'Escape') cancelNewFile();
});

// ── Add file to IDE ───────────────────────────────────────────────────────
function addFileToIDE(name, content) {
  const meta = extToMeta(name);
  const id = name + '_' + Date.now();
  const file = { id, name, lang: meta.lang, icon: meta.icon, ext: '.' + name.split('.').pop(), content, userCreated: true };
  SAMPLE_FILES.push(file);
  buildFileTree();
  buildTabs();
  loadFile(file);
  saveToLocalStorage();
}

// ── Delete file ───────────────────────────────────────────────────────────
function deleteFile(id, e) {
  e.stopPropagation();
  const idx = SAMPLE_FILES.findIndex(f => f.id === id);
  if (idx === -1) return;
  SAMPLE_FILES.splice(idx, 1);
  if (SAMPLE_FILES.length === 0) {
    // Add an empty placeholder
    addFileToIDE('untitled.js', '// Start coding here\n');
    return;
  }
  if (currentFile.id === id) {
    loadFile(SAMPLE_FILES[Math.min(idx, SAMPLE_FILES.length - 1)]);
  } else {
    buildFileTree();
    buildTabs();
  }
  saveToLocalStorage();
}

// ── Upload via button ─────────────────────────────────────────────────────
function triggerUpload() {
  document.getElementById('upload-input').click();
}

function handleUploadChange(input) {
  Array.from(input.files).forEach(readAndAddFile);
  input.value = '';
}

function readAndAddFile(file) {
  const reader = new FileReader();
  reader.onload = e => addFileToIDE(file.name, e.target.result);
  reader.readAsText(file);
}

// ── Drag & drop ───────────────────────────────────────────────────────────
const fileTree = document.getElementById('file-tree');

fileTree.addEventListener('dragover', e => {
  e.preventDefault();
  fileTree.classList.add('drag-over');
});
fileTree.addEventListener('dragleave', e => {
  if (!fileTree.contains(e.relatedTarget)) fileTree.classList.remove('drag-over');
});
fileTree.addEventListener('drop', e => {
  e.preventDefault();
  fileTree.classList.remove('drag-over');
  Array.from(e.dataTransfer.files).forEach(readAndAddFile);
});

// Also allow drop on the Monaco container
document.getElementById('monaco-container').addEventListener('dragover', e => {
  e.preventDefault();
  fileTree.classList.add('drag-over');
  document.getElementById('drop-hint').textContent = 'drop to open';
});
document.getElementById('monaco-container').addEventListener('dragleave', e => {
  fileTree.classList.remove('drag-over');
  document.getElementById('drop-hint').textContent = 'drag & drop files here';
});
document.getElementById('monaco-container').addEventListener('drop', e => {
  e.preventDefault();
  fileTree.classList.remove('drag-over');
  document.getElementById('drop-hint').textContent = 'drag & drop files here';
  Array.from(e.dataTransfer.files).forEach(readAndAddFile);
});

// ── Download current file ─────────────────────────────────────────────────
function downloadCurrentFile() {
  if (!monacoEditor || !currentFile) return;
  const content = monacoEditor.getValue();
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = currentFile.name;
  a.click();
  URL.revokeObjectURL(url);
}

// ── localStorage persistence ──────────────────────────────────────────────
const LS_KEY = 'fahh-play-files-v1';

function saveToLocalStorage() {
  try {
    // Only save user-created files + content of all files
    const toSave = SAMPLE_FILES.map(f => ({
      id: f.id, name: f.name, lang: f.lang, icon: f.icon, ext: f.ext,
      content: f.id === currentFile.id && monacoEditor ? monacoEditor.getValue() : f.content,
      userCreated: f.userCreated || false,
    }));
    localStorage.setItem(LS_KEY, JSON.stringify(toSave));
  } catch {}
}

function loadFromLocalStorage() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY));
    if (!saved || !saved.length) return;
    // Restore user-created files and any edits to sample files
    saved.forEach(saved => {
      const existing = SAMPLE_FILES.find(f => f.id === saved.id);
      if (existing) {
        existing.content = saved.content; // restore edits
      } else if (saved.userCreated) {
        SAMPLE_FILES.push(saved); // restore user file
      }
    });
  } catch {}
}

// Auto-save when editor content changes (debounced)
let saveTimer = null;
function scheduleAutoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    // Sync editor content to currentFile before saving
    if (monacoEditor && currentFile) {
      currentFile.content = monacoEditor.getValue();
    }
    saveToLocalStorage();
  }, 800);
}
</script>
